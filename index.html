<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SI-PAMAN TRI - Kab. Barito Selatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .container { max-width: 600px; margin-top: 20px; margin-bottom: 50px; }
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header-paman { background: linear-gradient(135deg, #1e5631, #a4de02); color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
    .nav-tabs { border: none; margin-bottom: 20px; }
    .nav-link { color: #555; border: none !important; border-radius: 10px !important; margin-right: 5px; }
    .nav-link.active { background-color: #1e5631 !important; color: white !important; }
    .btn-submit { background-color: #1e5631; border: none; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
    #loading { display: none; text-align: center; margin: 10px 0; }
    .preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header-paman">
      <h4 class="mb-0">SI-PAMAN TRI</h4>
      <small>Sistem Pelaporan Petugas Taman Terintegrasi</small>
    </div>
    
    <div class="card-body">
      <ul class="nav nav-tabs nav-fill" id="myTab" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="lapor-tab" data-bs-toggle="tab" data-bs-target="#lapor" type="button">Lapor</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="verif-tab" data-bs-toggle="tab" data-bs-target="#verif" type="button">Verifikasi</button>
        </li>
      </ul>

      <div class="tab-content" id="myTabContent">
        
        <div class="tab-pane fade show active" id="lapor" role="tabpanel">
          <form id="pamanForm">
            <div class="mb-3">
              <label class="form-label fw-bold">Nama Petugas</label>
              <select id="petugas" class="form-select" required onchange="loadLokasi()">
                <option value="">-- Pilih Nama --</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Lokasi Kerja</label>
              <select id="lokasi" class="form-select" required>
                <option value="">-- Pilih Lokasi --</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Jenis Pekerjaan</label>
              <select id="pekerjaan" class="form-select" required>
                <option value="">-- Pilih Pekerjaan --</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Foto Kegiatan</label>
              <input type="file" id="foto" class="form-control" accept="image/*" capture="camera" required onchange="previewImage(this)">
              <img id="imgPreview" class="preview-img">
            </div>

            <input type="hidden" id="gps">
            <button type="submit" class="btn-submit">KIRIM LAPORAN</button>
          </form>
        </div>

        <div class="tab-pane fade" id="verif" role="tabpanel">
          <div id="loginSection">
            <h6 class="text-center mb-3">Login Pengawas</h6>
            <select id="namaPengawas" class="form-select mb-2"></select>
            <input type="password" id="pinPengawas" class="form-control mb-3" placeholder="Masukkan PIN">
            <button class="btn btn-dark w-100" onclick="loginPengawas()">Masuk</button>
          </div>
          
          <div id="verifList" style="display:none;">
            <h6 class="fw-bold border-bottom pb-2">Daftar Pending</h6>
            <div id="itemContainer"></div>
          </div>
        </div>

      </div>

      <div id="loading">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2">Sedang memproses...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // GANTI INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxH4yIdguxxan2dKQ6qCLRY0laSur_fZ6zkR_t3jepietAHZnglyhRc9ohXcBrH3vpo1A/exec";

  let databasePetugas = {};

  window.onload = function() {
    ambilDataAwal();
    ambilDaftarPekerjaan();
    ambilLokasiGPS();
  };

  async function ambilDataAwal() {
    const res = await fetch(WEB_APP_URL);
    databasePetugas = await res.json();
    const select = document.getElementById('petugas');
    const selectP = document.getElementById('namaPengawas');
    
    Object.keys(databasePetugas).forEach(nama => {
      select.innerHTML += `<option value="${nama}">${nama}</option>`;
    });

    // Ambil Data Pengawas untuk Login
    const resP = await fetch(WEB_APP_URL + "?action=getAuthPengawas");
    const dataP = await resP.json();
    Object.keys(dataP).forEach(p => {
      selectP.innerHTML += `<option value="${p}">${p}</option>`;
    });
  }

  async function ambilDaftarPekerjaan() {
    const res = await fetch(WEB_APP_URL + "?action=getDaftarPekerjaan");
    const data = await res.json();
    const select = document.getElementById('pekerjaan');
    data.forEach(item => {
      select.innerHTML += `<option value="${item[0]}">${item[0]}</option>`;
    });
  }

  function loadLokasi() {
    const nama = document.getElementById('petugas').value;
    const selectLokasi = document.getElementById('lokasi');
    selectLokasi.innerHTML = '<option value="">-- Pilih Lokasi --</option>';
    
    if (databasePetugas[nama]) {
      databasePetugas[nama].lokasi.forEach(lok => {
        selectLokasi.innerHTML += `<option value="${lok}">${lok}</option>`;
      });
    }
  }

  function previewImage(input) {
    const preview = document.getElementById('imgPreview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function ambilLokasiGPS() {
    navigator.geolocation.getCurrentPosition(pos => {
      document.getElementById('gps').value = pos.coords.latitude + "," + pos.coords.longitude;
    });
  }

  document.getElementById('pamanForm').onsubmit = async function(e) {
    e.preventDefault();
    document.getElementById('loading').style.display = 'block';
    
    const file = document.getElementById('foto').files[0];
    const reader = new FileReader();
    reader.readAsDataURL(file);
    
    reader.onload = async function() {
      const base64 = reader.result.split(',')[1];
      const payload = {
        petugas: document.getElementById('petugas').value,
        lokasi: document.getElementById('lokasi').value,
        catatan: document.getElementById('pekerjaan').value,
        gps: document.getElementById('gps').value,
        pengawas: databasePetugas[document.getElementById('petugas').value].pengawas,
        bytes: base64,
        mimeType: file.type
      };

      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      
      alert(await res.text());
      location.reload();
    };
  };

  // LOGIKA VERIFIKASI (DISINGKAT)
  function loginPengawas() {
    // Tambahkan logika validasi PIN di sini sesuai Data_Pengawas
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('verifList').style.display = 'block';
    loadPending();
  }

  async function loadPending() {
    const res = await fetch(WEB_APP_URL + "?action=getPending");
    const data = await res.json();
    const container = document.getElementById('itemContainer');
    container.innerHTML = data.map(item => `
      <div class="card mb-2 p-2" style="font-size: 0.85rem">
        <b>${item.petugas}</b> (${item.lokasi})<br>
        <small>${item.catatan}</small>
        <div class="mt-2">
          <button class="btn btn-sm btn-success" onclick="verifikasi(${item.rowId}, 'APPROVED')">Setuju</button>
          <button class="btn btn-sm btn-danger" onclick="verifikasi(${item.rowId}, 'REJECTED')">Tolak</button>
        </div>
      </div>
    `).join('');
  }

  async function verifikasi(id, status) {
    await fetch(`${WEB_APP_URL}?action=verify&rowId=${id}&status=${status}&pengawas=${document.getElementById('namaPengawas').value}`, { method: 'POST' });
    alert("Berhasil!");
    loadPending();
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>
</body>
</html>
