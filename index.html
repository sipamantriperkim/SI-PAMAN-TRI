<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-PAMAN TRI | DISPERKIMTAN Barito Selatan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --secondary: #388e3c; }
        body { background: #f8faf8; font-family: 'Inter', sans-serif; }
        .bg-green-custom { 
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%); 
            position: relative;
            overflow: hidden;
        }
        /* Dekorasi Daun di Header */
        .leaf-bg {
            position: absolute;
            right: -20px;
            top: -20px;
            opacity: 0.1;
            transform: rotate(20deg);
        }
        .btn-submit { background-color: var(--primary); transition: all 0.3s ease; }
        .btn-submit:hover { background-color: var(--secondary); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(46, 125, 50, 0.3); }
        .tab-active { background: white; color: var(--primary); font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-icon { color: var(--primary); width: 18px; height: 18px; margin-right: 8px; }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased text-gray-900">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <div class="bg-green-custom p-10 text-white text-center rounded-b-[40px] shadow-lg">
            <svg class="leaf-bg w-32 h-32" fill="white" viewBox="0 0 24 24"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
            
            <div class="flex justify-center mb-3">
                <div class="bg-white/20 p-4 rounded-full backdrop-blur-sm">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">SI-PAMAN TRI</h1>
            <p class="text-xs opacity-90 mt-1 font-medium tracking-wide">Sistem Pelaporan Petugas Taman Terintegrasi</p>
        </div>

        <div class="flex p-1.5 bg-gray-100 mx-8 -mt-6 rounded-2xl shadow-md z-10">
            <button onclick="switchTab('lapor')" id="tabLaporBtn" class="flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl tab-active transition-all">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                LAPOR
            </button>
            <button onclick="switchTab('verif')" id="tabVerifBtn" class="flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl text-gray-500 transition-all font-semibold">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                VERIFIKASI
            </button>
        </div>

        <div id="sectionLapor" class="animate-[fadeIn_0.4s_ease-out]">
            <form id="reportForm" class="p-8 space-y-6">
                <div>
                    <label class="flex items-center text-xs font-bold text-gray-600 mb-2 uppercase tracking-wider">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Nama Petugas
                    </label>
                    <select id="petugas" required class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:border-green-500 focus:ring-4 focus:ring-green-50 outline-none bg-gray-50 text-sm transition-all appearance-none cursor-pointer">
                        <option value="">-- Memuat Nama... --</option>
                    </select>
                </div>

                <div>
                    <label class="flex items-center text-xs font-bold text-gray-600 mb-2 uppercase tracking-wider">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Lokasi Taman
                    </label>
                    <select id="lokasi" required class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:border-green-500 focus:ring-4 focus:ring-green-50 outline-none bg-gray-50 text-sm transition-all appearance-none cursor-pointer">
                        <option value="">-- Pilih Nama Petugas Dulu --</option>
                    </select>
                </div>

                <div id="wrapperLokasiLainnya" class="hidden">
                    <input type="text" id="lokasiManual" placeholder="Tulis nama lokasi baru..." 
                        class="w-full p-3.5 border-2 border-green-200 rounded-2xl focus:border-green-500 outline-none bg-white shadow-sm text-sm italic">
                </div>

                <div>
                    <label class="flex items-center text-xs font-bold text-gray-600 mb-2 uppercase tracking-wider">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Ambil Foto Pekerjaan
                    </label>
                    <div class="relative group">
                        <input type="file" id="foto" accept="image/*" capture="environment" required 
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-gray-300 p-6 rounded-2xl text-center group-hover:border-green-400 group-hover:bg-green-50 transition-all">
                            <p class="text-sm text-gray-500 font-medium">Klik untuk buka kamera</p>
                            <p class="text-[10px] text-gray-400 mt-1 italic">Maksimal 5MB (Format: JPG/PNG)</p>
                        </div>
                    </div>
                    
                    <div id="previewContainer" class="hidden mt-4 p-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Preview Tersimpan</span>
                        </div>
                        <img id="imagePreview" src="" class="w-full max-h-56 object-cover rounded-xl shadow-inner border-2 border-white">
                    </div>
                </div>

                <div>
                    <label class="flex items-center text-xs font-bold text-gray-600 mb-2 uppercase tracking-wider">
                        <svg class="form-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Jenis Pekerjaan
                    </label>
                    <select id="pilihanPekerjaan" required class="w-full p-3.5 border-2 border-gray-100 rounded-2xl focus:border-green-500 outline-none bg-gray-50 text-sm transition-all cursor-pointer">
                        <option value="">-- Memuat Pekerjaan... --</option>
                    </select>
                </div>

                <input type="hidden" id="gps">
                <input type="hidden" id="pengawasOtomatis">

                <button type="submit" id="submitBtn" class="w-full btn-submit text-white font-extrabold py-4 rounded-2xl shadow-xl flex justify-center items-center space-x-3 text-sm tracking-widest">
                    <span>KIRIM LAPORAN</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>

                <div id="successMessage" class="hidden mt-4 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded-r-xl text-center">
                    <p class="font-bold text-sm italic">✓ Laporan Berhasil Dikirim!</p>
                </div>
            </form>
        </div>

        <div id="sectionVerif" class="hidden animate-[fadeIn_0.4s_ease-out] p-8 space-y-6">
            <div class="flex justify-between items-end border-b pb-4">
                <div>
                    <h2 class="text-xs font-extrabold text-gray-400 uppercase tracking-widest">Antrean Verifikasi</h2>
                    <p id="labelLoginAs" class="text-sm text-green-700 font-bold mt-1"></p>
                </div>
                <button onclick="logoutPengawas()" class="text-[10px] bg-red-50 text-red-600 px-3 py-2 rounded-xl font-bold hover:bg-red-100 transition-colors">LOGOUT</button>
            </div>
            <div id="pendingContainer" class="space-y-4 pt-2">
                <p class="text-center text-gray-400 py-10 italic text-xs tracking-wide">Memuat data...</p>
            </div>
        </div>

        <footer class="text-center py-8 text-gray-300 text-[10px] mt-auto uppercase tracking-[0.2em] font-medium px-4">
            &copy; 2026 SI-PAMAN TRI<br>
            <span class="text-gray-400">DISPERKIMTAN KAB. BARITO SELATAN</span>
        </footer>
    </div>

    <script>
        /* ... Kode JavaScript Anda (scriptURL, form handler, fetch logic) tetap sama ... */
        /* Copy semua fungsi script dari kode Anda sebelumnya ke sini tanpa perubahan */
        
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzv69vAjup0V1boIms4ym3B5ICu40IIZq3XyXdkVNP448gma61LfwdiEnxxh8P7uoplmQ/exec';
        const form = document.getElementById('reportForm');
        const btn = document.getElementById('submitBtn');
        const selectPetugas = document.getElementById('petugas');
        const selectLokasi = document.getElementById('lokasi');
        const selectPekerjaan = document.getElementById('pilihanPekerjaan');
        const wrapperLokasiLainnya = document.getElementById('wrapperLokasiLainnya');
        const lokasiManual = document.getElementById('lokasiManual');
        const inputPengawas = document.getElementById('pengawasOtomatis');
        const successMsg = document.getElementById('successMessage');
        const inputFoto = document.getElementById('foto');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');

        let dataMapping = {}; 
        window.currentUserPengawas = null;

        window.onload = function() {
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    dataMapping = data;
                    selectPetugas.innerHTML = '<option value="">-- Pilih Nama --</option>';
                    Object.keys(data).sort().forEach(nama => {
                        const opt = document.createElement('option');
                        opt.value = opt.text = nama;
                        selectPetugas.add(opt);
                    });
                });

            fetch(scriptURL + "?action=getReferensiPekerjaan")
                .then(res => res.json())
                .then(daftar => {
                    selectPekerjaan.innerHTML = '<option value="">-- Pilih Pekerjaan --</option>';
                    daftar.forEach(pjk => {
                        const opt = document.createElement('option');
                        opt.value = opt.text = pjk;
                        selectPekerjaan.add(opt);
                    });
                });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('gps').value = pos.coords.latitude + "," + pos.coords.longitude;
                }, err => { console.warn("GPS Dimatikan user"); });
            }
        };

        selectPetugas.addEventListener('change', function() {
            selectLokasi.innerHTML = '<option value="">-- Pilih Lokasi Tugas --</option>';
            if (this.value && dataMapping[this.value]) {
                let listLokasi = dataMapping[this.value].lokasi;
                listLokasi.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = opt.text = loc.trim();
                    selectLokasi.add(opt);
                });
                const optLainnya = document.createElement('option');
                optLainnya.value = "Lainnya..."; optLainnya.text = "Lainnya...";
                selectLokasi.add(optLainnya);
                inputPengawas.value = dataMapping[this.value].pengawas || "BERKAT";
            }
        });

        selectLokasi.addEventListener('change', function() {
            const isManual = this.value === "Lainnya...";
            wrapperLokasiLainnya.classList.toggle('hidden', !isManual);
            lokasiManual.required = isManual;
        });

        inputFoto.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { imagePreview.src = e.target.result; previewContainer.classList.remove('hidden'); }
                reader.readAsDataURL(file);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "<span>MENGIRIM...</span>";
            
            try {
                const bytes = await compressImage(inputFoto.files[0]);
                const params = new URLSearchParams({
                    petugas: selectPetugas.value,
                    lokasi: selectLokasi.value === "Lainnya..." ? lokasiManual.value : selectLokasi.value,
                    catatan: selectPekerjaan.value,
                    gps: document.getElementById('gps').value,
                    pengawas: inputPengawas.value
                });

                const response = await fetch(`${scriptURL}?${params.toString()}`, {
                    method: 'POST',
                    body: JSON.stringify({ bytes: bytes, mimeType: 'image/jpeg' })
                });

                if (response.ok) {
                    successMsg.classList.remove('hidden');
                    form.reset();
                    previewContainer.classList.add('hidden');
                    setTimeout(() => successMsg.classList.add('hidden'), 5000);
                }
            } catch (err) {
                alert("Gagal mengirim laporan: " + err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "KIRIM LAPORAN";
            }
        });

        async function switchTab(mode) {
            const isLapor = mode === 'lapor';
            if (!isLapor && !window.currentUserPengawas) {
                const res = await fetch(scriptURL + "?action=getAuthPengawas");
                const auth = await res.json();
                let inputNama = prompt("MASUKKAN NAMA PENGAWAS:");
                if (!inputNama) return;
                const namaKey = inputNama.toUpperCase().trim();
                if (auth[namaKey]) {
                    const pin = prompt("MASUKKAN PIN KEAMANAN:");
                    if (pin === auth[namaKey].toString()) {
                        window.currentUserPengawas = namaKey;
                        document.getElementById('labelLoginAs').innerText = "Login: " + namaKey;
                    } else { alert("PIN SALAH!"); return; }
                } else { alert("NAMA TIDAK TERDAFTAR!"); return; }
            }
            document.getElementById('sectionLapor').classList.toggle('hidden', !isLapor);
            document.getElementById('sectionVerif').classList.toggle('hidden', isLapor);
            document.getElementById('tabLaporBtn').className = isLapor ? 'flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl tab-active transition-all' : 'flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl text-gray-500 transition-all font-semibold';
            document.getElementById('tabVerifBtn').className = !isLapor ? 'flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl tab-active transition-all' : 'flex-1 flex items-center justify-center py-2.5 text-xs rounded-xl text-gray-500 transition-all font-semibold';
            if (!isLapor) loadPending();
        }

        function loadPending() {
            const container = document.getElementById('pendingContainer');
            container.innerHTML = '<div class="text-center py-10"><div class="inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full loader-spin"></div></div>';
            fetch(scriptURL + "?action=getPending")
                .then(res => res.json())
                .then(data => {
                    const filtered = data.filter(item => {
                        const petData = dataMapping[item.petugas];
                        return petData && petData.pengawas.toString().toUpperCase().trim() === window.currentUserPengawas;
                    });
                    container.innerHTML = filtered.length ? '' : '<p class="text-center py-10 italic text-gray-400 text-xs">Belum ada laporan.</p>';
                    filtered.forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-[25px] border border-gray-100 shadow-sm space-y-4">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-[14px] font-extrabold text-gray-800">${item.petugas}</p>
                                        <p class="text-[10px] text-gray-500 font-medium">📍 ${item.lokasi}</p>
                                    </div>
                                    <span class="bg-yellow-50 text-yellow-600 text-[9px] px-3 py-1 rounded-full font-bold border border-yellow-100">PENDING</span>
                                </div>
                                <p class="text-[11px] text-gray-600 bg-gray-50 p-3 rounded-xl italic">"${item.catatan}"</p>
                                <div class="flex space-x-2">
                                    <a href="${item.foto}" target="_blank" class="flex-1 bg-gray-800 text-white text-[10px] py-3 rounded-xl font-bold text-center">FOTO</a>
                                    <button onclick="doVerify(${item.rowId}, 'APPROVED')" class="flex-1 bg-green-600 text-white text-[10px] py-3 rounded-xl font-bold">SETUJU</button>
                                    <button onclick="doVerify(${item.rowId}, 'REJECTED')" class="flex-1 bg-red-500 text-white text-[10px] py-3 rounded-xl font-bold">TOLAK</button>
                                </div>
                            </div>`;
                    });
                });
        }

        function doVerify(rowId, status) {
            if (!confirm("Konfirmasi " + status + "?")) return;
            fetch(`${scriptURL}?action=verify&rowId=${rowId}&status=${status}&pengawas=${window.currentUserPengawas}`, { method: 'POST' })
                .then(() => loadPending())
                .catch(err => alert("Gagal: " + err));
        }

        function logoutPengawas() { window.currentUserPengawas = null; switchTab('lapor'); }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        const maxSide = 1000;
                        if (width > height) { if (width > maxSide) { height *= maxSide / width; width = maxSide; } }
                        else { if (height > maxSide) { width *= maxSide / height; height = maxSide; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); 
                    };
                };
            });
        }
    </script>
</body>
</html>
