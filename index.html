<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-PAMAN TRI | DISPERKIMTAN Barito Selatan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; }
        body { background: #f8faf8; }
        .bg-gradient-green { background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%); }
        .btn-submit { background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%); transition: all 0.3s ease; }
        .btn-submit:active { transform: scale(0.96); opacity: 0.9; }
        .tab-active { background: white; color: #1b5e20; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-custom { border-radius: 24px; box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased text-gray-900">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col overflow-hidden">
        
        <div class="bg-gradient-green p-10 text-white text-center rounded-b-[40px] shadow-lg relative">
            <div class="flex justify-center mb-4">
                <div class="bg-white/20 p-4 rounded-full backdrop-blur-sm">
                    <svg class="w-12 h-12 text-green-100" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-black tracking-tight leading-none">SI-PAMAN TRI</h1>
            <p class="text-[11px] opacity-80 mt-2 font-medium tracking-[0.1em] uppercase">Disperkimtan Barito Selatan</p>
        </div>

        <div class="flex p-1.5 bg-gray-100/80 mx-8 -mt-6 rounded-2xl space-x-1 relative z-20 backdrop-blur-md border border-white/50">
            <button onclick="switchTab('lapor')" id="tabLaporBtn" class="flex-1 py-2.5 text-[11px] rounded-xl tab-active transition-all duration-300">LAPOR</button>
            <button onclick="switchTab('verif')" id="tabVerifBtn" class="flex-1 py-2.5 text-[11px] rounded-xl text-gray-500 font-bold transition-all duration-300">VERIFIKASI</button>
        </div>

        <div id="sectionLapor" class="animate-fadeIn">
            <form id="reportForm" class="p-8 space-y-6">
                <div class="space-y-1">
                    <label class="text-[12px] font-bold text-gray-500 ml-1 uppercase tracking-wider">Nama Petugas</label>
                    <select id="petugas" required class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-green-500 focus:bg-white outline-none bg-gray-50 transition-all text-sm font-medium">
                        <option value="">-- Memuat Nama... --</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-[12px] font-bold text-gray-500 ml-1 uppercase tracking-wider">Lokasi Taman</label>
                    <select id="lokasi" required class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-green-500 focus:bg-white outline-none bg-gray-50 transition-all text-sm font-medium">
                        <option value="">-- Pilih Nama Petugas Dulu --</option>
                    </select>
                </div>

                <div id="wrapperLokasiLainnya" class="hidden animate-pulse">
                    <input type="text" id="lokasiManual" placeholder="Ketik nama lokasi baru..." 
                        class="w-full p-4 border-2 border-green-200 rounded-2xl focus:border-green-500 outline-none bg-green-50/30 text-sm shadow-inner">
                </div>

                <div class="space-y-1">
                    <label class="text-[12px] font-bold text-gray-500 ml-1 uppercase tracking-wider">Foto Pekerjaan</label>
                    <div class="relative group">
                        <input type="file" id="foto" accept="image/*" capture="environment" required 
                            class="w-full text-xs text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-[11px] file:font-bold file:bg-green-600 file:text-white border-2 border-dashed border-gray-200 p-3 rounded-2xl hover:border-green-400 transition-colors">
                    </div>
                    
                    <div id="previewContainer" class="hidden mt-4 p-2 bg-gray-50 rounded-2xl border border-gray-100 flex flex-col items-center">
                        <img id="imagePreview" src="" class="max-h-52 rounded-xl shadow-lg border-4 border-white">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[12px] font-bold text-gray-500 ml-1 uppercase tracking-wider">Jenis Pekerjaan</label>
                    <select id="pilihanPekerjaan" required class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-green-500 outline-none bg-gray-50 text-sm font-medium">
                        <option value="">-- Memuat Pekerjaan... --</option>
                    </select>
                </div>

                <input type="hidden" id="gps">
                <input type="hidden" id="pengawasOtomatis">

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full btn-submit text-white font-black py-5 rounded-[22px] shadow-xl shadow-green-900/20 flex justify-center items-center space-x-3 uppercase tracking-widest text-sm">
                        <span>KIRIM LAPORAN</span>
                    </button>
                </div>

                <div id="successMessage" class="hidden p-4 bg-green-500 text-white rounded-2xl text-center shadow-lg animate-bounce text-xs font-bold">
                    ✅ LAPORAN BERHASIL TERKIRIM!
                </div>
            </form>
        </div>

        <div id="sectionVerif" class="hidden p-8 space-y-5">
            <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <div>
                    <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Pengawas</h2>
                    <p id="labelLoginAs" class="text-sm text-green-700 font-black"></p>
                </div>
                <button onclick="logoutPengawas()" class="text-[10px] bg-red-50 text-red-600 px-4 py-2 rounded-xl font-black hover:bg-red-100 transition-colors">LOGOUT</button>
            </div>
            
            <div id="pendingContainer" class="space-y-4">
                </div>
        </div>

        <footer class="text-center py-8">
            <div class="h-[1px] w-12 bg-gray-200 mx-auto mb-4"></div>
            <p class="text-gray-300 text-[9px] font-bold uppercase tracking-[0.3em]">SI-PAMAN TRI &bull; 2026</p>
        </footer>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzv69vAjup0V1boIms4ym3B5ICu40IIZq3XyXdkVNP448gma61LfwdiEnxxh8P7uoplmQ/exec';
        // ... (Gunakan logika script yang Mas berikan tadi, sudah sangat benar) ...
        // Note: Pastikan fungsi switchTab dan loadPending memanggil ID yang sesuai di atas.
    </script>
</body>
</html>
