<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-PAMAN TRI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f7f4; font-family: sans-serif; }
        .bg-green-main { background: #2e7d32; }
        .text-green-main { color: #2e7d32; }
        .border-green-main { border-color: #2e7d32; }
        
        /* Style untuk ikon bulat kecil di sebelah label */
        .icon-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1.5px solid #2e7d32;
            border-radius: 50%;
            margin-left: 6px;
            color: #2e7d32;
            padding: 3px;
        }

        /* Style tombol pilih file seperti di gambar */
        .btn-pilih-file {
            background: #f0faf0;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative flex flex-col">
        
        <div class="bg-green-main p-10 text-white text-center rounded-b-[45px] shadow-md relative overflow-hidden">
            <div class="absolute top-0 left-0 opacity-10 p-4">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="white"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
            </div>
            
            <div class="flex justify-center mb-2">
                <svg class="w-14 h-14" viewBox="0 0 24 24" fill="white"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">SI-PAMAN TRI</h1>
            <p class="text-[11px] opacity-80 mt-1 uppercase tracking-wider font-light">Sistem Pelaporan Petugas Taman Terintegrasi</p>
        </div>

        <div class="flex p-1 bg-gray-50 mx-6 -mt-6 rounded-xl shadow-sm border border-gray-100 relative z-20">
            <button class="flex-1 py-3 text-xs font-bold text-green-700 bg-white rounded-lg shadow-sm flex items-center justify-center border-b-2 border-green-700">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                LAPOR
            </button>
            <button class="flex-1 py-3 text-xs font-bold text-gray-400 flex items-center justify-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                VERIFIKASI
            </button>
        </div>

        <form class="p-6 space-y-5">
            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2">
                    Nama Petugas 
                    <span class="icon-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                </label>
                <select class="w-full p-3 border rounded-xl bg-white text-gray-500 text-sm focus:outline-none focus:border-green-600 appearance-none">
                    <option>-- Pilih Nama --</option>
                </select>
            </div>

            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2">
                    Lokasi Taman
                    <span class="icon-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4.5 8-11.8A8 8 0 004 10.2c0 7.3 8 11.8 8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
                    </span>
                </label>
                <select class="w-full p-3 border rounded-xl bg-white text-gray-500 text-sm focus:outline-none focus:border-green-600 appearance-none">
                    <option>-- Pilih Nama Petugas Dulu --</option>
                </select>
            </div>

            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2">
                    Ambil Foto Pekerjaan
                    <span class="icon-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    </span>
                </label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 flex items-center relative overflow-hidden">
                    <input type="file" class="absolute inset-0 opacity-0 cursor-pointer">
                    <button type="button" class="btn-pilih-file mr-3">Pilih File</button>
                    <span class="text-xs text-gray-400">Tidak ada file yang dipilih</span>
                    
                    <div class="absolute right-4 opacity-5">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="black"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8" stroke="white"/></svg>
                    </div>
                </div>
            </div>

            <div>
                <label class="flex items-center text-sm font-bold text-gray-700 mb-2">
                    Jenis Pekerjaan
                    <span class="icon-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
                    </span>
                </label>
                <select class="w-full p-3 border rounded-xl bg-white text-gray-500 text-sm focus:outline-none focus:border-green-600 appearance-none">
                    <option>-- Pilih Pekerjaan --</option>
                </select>
            </div>

            <button class="w-full bg-green-main text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center space-x-2 active:scale-95 transition-transform">
                <span>KIRIM LAPORAN</span>
                <svg class="w-5 h-5 transform rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>

        <footer class="text-center py-6 mt-auto">
            <p class="text-[10px] text-gray-400 font-medium tracking-widest">
                © 2026 SI-PAMAN TRI - DISPERKIMTAN KAB. BARSEL
            </p>
        </footer>
    </div>

</body>
</html>
